apiVersion: v3.1.0
kind: DataContract
id: export
name: Export Contract
version: 1.0.0
status: active
description:
  purpose: "Export dataset containing medical event and sampling information"
  usage: "Used for analytics and downstream processing"
  limitations: "Historical data may contain legacy timestamps"

schema:
  - name: export
    physicalType: TABLE
    description: Exported dataset containing patient event and laboratory sampling data
    properties:
      - name: IPP
        logicalType: string
        physicalType: TEXT
        description: Identifiant patient permanent
        required: true
        quality:
          - type: sql
            description: IPP must be between 35 and 37 characters
            query: "SELECT COUNT(*) FROM export WHERE LENGTH(IPP) NOT BETWEEN 35 AND 37"
            mustBe: 0


      - name: IEP
        logicalType: string
        physicalType: TEXT
        description: Identifiant d’épisode patient
        required: true

      - name: EVENT_TIME
        logicalType: timestamp[us, tz=Europe/Paris]
        physicalType: TIMESTAMP
        description: Timestamp of the recorded event
        required: true
        quality:
          - type: sql
            description: EVENT_TIME must be after 1925-01-01
            query: "SELECT COUNT(*) FROM export WHERE EVENT_TIME < '1925-01-01 00:00:00'"
            mustBe: 0

      - name: PRELEVEMENT_DATE
        logicalType: timestamp[us, tz=Europe/Paris]
        physicalType: TIMESTAMP
        description: Date and time when the sample was taken
        required: true
        quality:
          - type: sql
            description: PRELEVEMENT_DATE must be after 1925-01-01
            query: "SELECT COUNT(*) FROM export WHERE PRELEVEMENT_DATE < '1925-01-01 00:00:00'"
            mustBe: 0

      - name: UF
        logicalType: string
        physicalType: TEXT
        description: Unité fonctionnelle
        required: true
        quality:
          - type: sql
            description: UF must contain exactly 4 characters
            query: "SELECT COUNT(*) FROM export WHERE LENGTH(UF) != 4"
            mustBe: 0

      - name: RESULTAT_TEXTE
        logicalType: string
        physicalType: TEXT
        description: Résultat textuel du test
        required: true

