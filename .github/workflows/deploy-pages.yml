name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm install --no-fund --no-audit

      - name: Build site CSS
        run: npm run build:site:css

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Pages artifact
        run: |
          set -euo pipefail
          rm -rf site_dist
          cp -R site site_dist

          rm -rf site_dist/python/clinical_contract
          mkdir -p site_dist/python/clinical_contract
          cp src/clinical_contract/__init__.py site_dist/python/clinical_contract/
          cp src/clinical_contract/contract.py site_dist/python/clinical_contract/
          cp src/clinical_contract/loader.py site_dist/python/clinical_contract/
          cp src/clinical_contract/models.py site_dist/python/clinical_contract/
          cp src/clinical_contract/py.typed site_dist/python/clinical_contract/

          if find site_dist -type l | grep -q .; then
            echo "::error::Symlinks detected in site_dist. Refusing deploy."
            find site_dist -type l -print
            exit 1
          fi

      - name: Upload Pages artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
