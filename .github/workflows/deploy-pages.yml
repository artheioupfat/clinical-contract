name: Deploy Pages (Symlink Attempt)

on:
  push:
    branches: [web]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Preflight symlink check
        run: |
          set -euo pipefail
          echo "Inspecting site/python directory..."
          ls -la site/python
          if [ -L site/python/clinical_contract/site/index.html ]; then
            echo "Detected symlink: site/python/clinical_contract"
            echo "Target: $(readlink site/python/clinical_contract)"
          else
            echo "::warning::site/python/clinical_contract is not a symlink."
          fi

      - name: Upload Pages artifact (site/)
        id: upload
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.upload.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Fail fast if symlink deployment is rejected
        if: steps.upload.outcome != 'success' || steps.deployment.outcome == 'failure'
        run: |
          echo "::error::GitHub Pages artifacts do not support symlinks; switch to copied package strategy."
          echo "Upload outcome: ${{ steps.upload.outcome }}"
          echo "Deploy outcome: ${{ steps.deployment.outcome }}"
          exit 1
