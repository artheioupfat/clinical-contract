name: CI & Publish

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v --tb=short

  package-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package metadata
        run: twine check dist/*

  publish:
    needs: package-check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches project version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          ref = os.environ["GITHUB_REF"]
          tag = ref.rsplit("/", 1)[-1]
          if not tag.startswith("v"):
              print(f"Invalid tag format: {tag}. Expected 'vX.Y.Z'.", file=sys.stderr)
              raise SystemExit(1)

          tag_version = tag[1:]
          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          project_version = tomllib.loads(pyproject)["project"]["version"]

          if tag_version != project_version:
              print(
                  f"Tag/version mismatch: tag={tag_version}, pyproject={project_version}",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f"Tag {tag} matches pyproject version {project_version}.")
          PY

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
