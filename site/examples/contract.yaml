apiVersion: v3.1.0222
kind: DataContract
id: clinical-template
name: Clinical Template Contract56
version: 1.0.0
status: active
description:
  purpose: "Template dataset for demonstrating clinical-contract validation and checks"
  usage: "Used in the browser playground to validate a YAML contract against a matching Parquet file"
  limitations: "Synthetic data only; values are randomly generated for demonstration purposes"

study:
  startDate: "2024-01-01"
  endDate: "2024-12-31"
  type: "cohort"
  objective: "predictive"
  healthDomain: "synthetic clinical data"

schema:
  - name: export
    physicalType: TABLE
    description: Synthetic clinical export used by the playground template
    properties:
      - name: PATIENT_ID
        logicalType: string
        physicalType: varchar
        description: Synthetic patient identifier generated for the template dataset
        required: true
        quality:
          - type: sql
            description: PATIENT_ID must not be null
            query: "SELECT COUNT(*) FROM export WHERE PATIENT_ID IS NULL"
            mustBe: 0

      - name: STAY
        logicalType: integer
        physicalType: uint32
        description: Synthetic hospital stay identifier
        required: true
        quality:
          - type: sql
            description: STAY must not be null
            query: "SELECT COUNT(*) FROM export WHERE STAY IS NULL"
            mustBe: 0

      - name: VALUE
        logicalType: float
        physicalType: float64
        description: Synthetic numeric measurement value
        required: true

      - name: LIFE_STATUS
        logicalType: boolean
        description: Synthetic life status flag
        required: true

      - name: EVENT_TIME
        logicalType: date
        physicalType: timestamp
        description: Timestamp of the synthetic clinical event
        required: true
        quality:
          - type: sql
            description: EVENT_TIME must be after 1925-01-01
            query: "SELECT COUNT(*) FROM export WHERE EVENT_TIME < TIMESTAMP '1925-01-01 00:00:00'"
            mustBe: 0

team:
  name: CDC Brest
  description: Clinical data center CHU Brest
  members:
    - name: Sacha SCHUTZ
      role: Doctor
      email: sacha.schutz@chu-brest.fr
    - name: Alexis GOURANTON
      role: Data Scientist
      email: alexis.gouranton@chu-brest.fr
