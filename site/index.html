<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clinical-contract</title>
    <style>[x-cloak]{display:none!important}</style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.10.2/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.10.2/core.js"></script>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body class="bg-slate-100 text-slate-800 antialiased">
    <div x-data="clinicalApp()" x-init="init()" class="h-screen overflow-hidden" :class="switchOn ? 'bg-black' : ''">
      <div
        class="mx-4 my-4 flex h-[calc(100vh-2rem)] flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"
        :class="switchOn ? 'theme-dark page-night' : ''"
      >
        <header class="flex items-center justify-between border-b border-slate-200 bg-slate-50/90 px-4 py-3">
          <div class="flex items-center gap-3">
            <div class="flex h-20 w-24 items-center justify-center overflow-hidden rounded-xl bg-white ring-1 ring-slate-200">
              <img
                :src="logoSrc"
                :alt="logoAlt"
                class="h-16 w-20 object-contain"
                @error="handleLogoError"
              >
            </div>
            <div>
              <div class="flex items-center gap-2">
                <h1 class="text-base font-semibold tracking-tight">clinical-contract</h1>
                <span class="rounded-full bg-emerald-100 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-[0.18em] text-emerald-700">beta</span>
              </div>
            </div>
          </div>

          <div class="flex items-center justify-center space-x-2">
            <input id="theme-switch" type="checkbox" name="theme-switch" class="hidden" :checked="switchOn">

            <button
              x-ref="switchButton"
              type="button"
              @click="toggleThemeSwitch()"
              :class="switchOn ? 'bg-blue-600' : 'bg-neutral-200'"
              class="relative inline-flex h-6 w-10 rounded-full py-0.5 focus:outline-none"
              x-cloak
            >
              <span :class="switchOn ? 'translate-x-[18px]' : 'translate-x-0.5'" class="h-5 w-5 rounded-full bg-white shadow-md duration-200 ease-in-out"></span>
            </button>

            <label
              @click="$refs.switchButton.click(); $refs.switchButton.focus()"
              for="theme-switch"
              :class="{ 'text-blue-600': switchOn, 'text-gray-500': !switchOn }"
              class="select-none text-sm font-medium"
              x-cloak
            >
              <span x-text="switchOn ? 'Light' : 'Dark'"></span>
            </label>
          </div>
        </header>

        <main class="min-h-0 flex-1">
          <div class="grid h-full min-h-0 grid-cols-1 lg:grid-cols-[1fr_0.95fr]">
            <section class="min-h-0 min-w-0 border-b border-slate-200 lg:border-b-0 lg:border-r">
              <div class="panel-head">
                <div>
                  <div class="panel-eyebrow">Editor</div>
                  <div class="panel-title" x-text="yamlName || 'contract.yaml'"></div>
                </div>
                <div class="flex items-center gap-2">
                  <label class="toolbar-btn cursor-pointer">
                    Load contract
                    <input x-ref="yamlInput" type="file" class="hidden" accept=".yaml,.yml" @change="importYaml($event)" />
                  </label>
                  <button
                    type="button"
                    @click="downloadYaml()"
                    class="toolbar-btn"
                  >
                    Download contract
                  </button>
                  <button
                    type="button"
                    @click="validateContract()"
                    :disabled="busy || !pythonReady"
                    class="toolbar-btn toolbar-btn--accent"
                  >
                    Validate
                  </button>
                </div>
              </div>
              <div class="editor-wrap" @dragover.prevent @drop.prevent="dropYaml($event)">
                <div class="editor-gutter" aria-hidden="true">
                  <template x-for="line in lineNumbers" :key="line">
                    <div class="editor-line-number" x-text="line"></div>
                  </template>
                </div>
                <textarea
                  id="yaml-editor"
                  x-model="yamlText"
                  @scroll="syncEditorScroll($event)"
                  spellcheck="false"
                  class="editor-textarea"
                  placeholder="Drop a YAML data contract here."
                ></textarea>
              </div>
            </section>

            <section class="min-h-0 min-w-0">
              <div class="panel-head">
                <div>
                  <div class="panel-eyebrow">Checker</div>
                  <div class="panel-title" x-text="dataFileName || 'Drop a parquet/csv file'"></div>
                </div>
                <div class="flex items-center gap-2">
                  <div class="data-stats" x-show="dataStatsText()" x-cloak x-text="dataStatsText()"></div>
                  <label class="toolbar-btn cursor-pointer">
                    Load data
                    <input x-ref="dataInput" type="file" class="hidden" accept=".parquet,.csv" @change="pickDataFile($event)" />
                  </label>
                  <button type="button" @click="runCheck()" :disabled="busy || !pythonReady || !dataFile" class="toolbar-btn toolbar-btn--success">Run checks</button>
                </div>
              </div>

              <div class="checker-body">
                <div
                  class="dropzone"
                  :class="draggingData ? 'dropzone--active' : ''"
                  @dblclick="$refs.dataInput.click()"
                  @dragenter.prevent="draggingData = true"
                  @dragover.prevent="draggingData = true"
                  @dragleave.prevent="draggingData = false"
                  @drop.prevent="dropData($event)"
                >
                  <div class="flex items-center gap-3">
                    <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-slate-100 text-slate-500">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 16V4m0 0l-4 4m4-4l4 4M4 16.5v1.25A2.25 2.25 0 006.25 20h11.5A2.25 2.25 0 0020 17.75V16.5" />
                      </svg>
                    </div>
                    <div>
                      <div class="text-sm font-medium text-slate-700">Drag &amp; drop parquet or csv here</div>
                      <div class="text-xs text-slate-500">Or use “Load data” to pick a local file.</div>
                    </div>
                  </div>
                  <div class="text-xs text-slate-400" x-text="dataFileName || 'No file selected'"></div>
                </div>

                <div class="results-shell">
                  <div class="results-tabs">
                    <button type="button" class="result-tab" :class="activeTab === 'validate' ? 'result-tab--active' : ''" @click="activeTab = 'validate'">
                      <span class="inline-flex items-center gap-2">
                        <span class="h-2.5 w-2.5 rounded-full" :class="tabDotClass(validateTabState)"></span>
                        <span>Validate</span>
                      </span>
                    </button>
                    <button type="button" class="result-tab" :class="activeTab === 'schema' ? 'result-tab--active' : ''" @click="activeTab = 'schema'">
                      <span class="inline-flex items-center gap-2">
                        <span class="h-2.5 w-2.5 rounded-full" :class="tabDotClass(schemaTabState)"></span>
                        <span>Schema</span>
                      </span>
                    </button>
                    <button type="button" class="result-tab" :class="activeTab === 'quality' ? 'result-tab--active' : ''" @click="activeTab = 'quality'">
                      <span class="inline-flex items-center gap-2">
                        <span class="h-2.5 w-2.5 rounded-full" :class="tabDotClass(qualityTabState)"></span>
                        <span>Quality</span>
                      </span>
                    </button>
                    <button
                      type="button"
                      class="result-tab ml-auto"
                      :class="activeTab === 'preview' ? 'result-tab--active' : ''"
                      @click="activeTab = 'preview'"
                      x-show="dataFile"
                      x-cloak
                    >
                      <span>Preview</span>
                    </button>
                  </div>

                  <div class="results-table-wrap" x-show="activeTab === 'validate'" x-cloak>
                    <table class="results-table">
                      <thead>
                        <tr>
                          <th>Field</th>
                          <th>Status</th>
                          <th>Value</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-if="validateRows.length === 0">
                          <tr><td colspan="3" class="empty-row">No validation result yet.</td></tr>
                        </template>
                        <template x-for="row in validateRows" :key="row.field">
                          <tr>
                            <td x-text="row.field"></td>
                            <td>
                              <span class="inline-flex items-center gap-2" :class="row.status === 'passed' ? 'text-emerald-600' : 'text-rose-600'">
                                <span class="h-2.5 w-2.5 rounded-full" :class="row.status === 'passed' ? 'bg-emerald-500' : 'bg-rose-500'"></span>
                                <span x-text="row.status"></span>
                              </span>
                            </td>
                            <td x-text="row.value"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                  <div class="results-table-wrap" x-show="activeTab === 'schema'" x-cloak>
                    <table class="results-table">
                      <thead>
                        <tr>
                          <th>Schema</th>
                          <th>Column</th>
                          <th>Expected</th>
                          <th>Detected</th>
                          <th>Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-if="schemaRows.length === 0">
                          <tr><td colspan="5" class="empty-row">No schema result yet.</td></tr>
                        </template>
                        <template x-for="(row, idx) in schemaRows" :key="`${row.schema_name}-${row.column}-${idx}`">
                          <tr>
                            <td x-text="row.schema_name"></td>
                            <td x-text="row.column"></td>
                            <td x-text="row.yaml_type"></td>
                            <td x-text="row.parquet_type"></td>
                            <td>
                              <span class="inline-flex items-center gap-2" :class="row.status === 'passed' ? 'text-emerald-600' : 'text-rose-600'">
                                <span class="h-2.5 w-2.5 rounded-full" :class="row.status === 'passed' ? 'bg-emerald-500' : 'bg-rose-500'"></span>
                                <span x-text="row.status"></span>
                              </span>
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                  <div class="results-table-wrap" x-show="activeTab === 'quality'" x-cloak>
                    <table class="results-table">
                      <thead>
                        <tr>
                          <th>Schema</th>
                          <th>Column</th>
                          <th>Rule</th>
                          <th>Obtained</th>
                          <th>Expected</th>
                          <th>Result</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-if="qualityRows.length === 0">
                          <tr><td colspan="6" class="empty-row">No quality result yet.</td></tr>
                        </template>
                        <template x-for="(row, idx) in qualityRows" :key="`${row.property_name}-${idx}`">
                          <tr>
                            <td x-text="row.schema_name"></td>
                            <td x-text="row.property_name"></td>
                            <td x-text="row.description"></td>
                            <td x-text="row.obtained"></td>
                            <td x-text="row.expected"></td>
                            <td>
                              <span class="inline-flex items-center gap-2" :class="row.status === 'passed' ? 'text-emerald-600' : row.status === 'failed' ? 'text-rose-600' : 'text-amber-600'">
                                <span class="h-2.5 w-2.5 rounded-full" :class="row.status === 'passed' ? 'bg-emerald-500' : row.status === 'failed' ? 'bg-rose-500' : 'bg-amber-500'"></span>
                                <span x-text="row.status"></span>
                              </span>
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                  <div class="results-table-wrap" x-show="activeTab === 'preview'" x-cloak>
                    <div class="flex h-full flex-col">
                      <div class="overflow-x-auto">
                        <div class="inline-block min-w-full">
                          <div class="overflow-hidden">
                            <table class="min-w-full divide-y divide-neutral-200">
                              <thead>
                                <tr class="text-neutral-500">
                                  <template x-if="previewColumns.length === 0">
                                    <th class="px-5 py-3 text-xs font-medium text-left uppercase">Data preview</th>
                                  </template>
                                  <template x-for="(columnName, idx) in previewColumns" :key="`preview-col-${idx}`">
                                    <th class="px-5 py-3 text-xs font-medium text-left uppercase" x-text="columnName"></th>
                                  </template>
                                </tr>
                              </thead>
                              <tbody class="divide-y divide-neutral-200">
                                <template x-if="previewLoading">
                                  <tr class="text-neutral-800">
                                    <td class="px-5 py-4 text-sm whitespace-nowrap" :colspan="Math.max(1, previewColumns.length)">Loading preview page...</td>
                                  </tr>
                                </template>
                                <template x-if="!previewLoading && previewError">
                                  <tr class="text-rose-700">
                                    <td class="px-5 py-4 text-sm" :colspan="Math.max(1, previewColumns.length)" x-text="previewError"></td>
                                  </tr>
                                </template>
                                <template x-if="!previewLoading && !previewError && previewRows.length === 0">
                                  <tr class="text-neutral-800">
                                    <td class="px-5 py-4 text-sm whitespace-nowrap" :colspan="Math.max(1, previewColumns.length)">No preview rows yet. Load a data file to inspect rows.</td>
                                  </tr>
                                </template>
                                <template x-for="(row, rowIdx) in previewRows" :key="`preview-row-${rowIdx}`">
                                  <tr class="text-neutral-800">
                                    <template x-for="(cell, cellIdx) in row" :key="`preview-cell-${rowIdx}-${cellIdx}`">
                                      <td class="px-5 py-4 text-sm whitespace-nowrap" x-text="cell === null ? 'null' : String(cell)"></td>
                                    </template>
                                  </tr>
                                </template>
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>

                      <div class="mt-auto flex items-center justify-between w-full h-16 px-3 border-t border-neutral-200" x-show="!previewError" x-cloak>
                        <p class="pl-2 text-sm text-gray-700">
                          Showing
                          <span class="font-medium" x-text="previewStartRow"></span>
                          to
                          <span class="font-medium" x-text="previewEndRow"></span>
                          of
                          <span class="font-medium" x-text="previewTotalRows"></span>
                          results
                        </p>
                        <nav>
                          <ul class="flex items-center text-sm leading-tight bg-white border divide-x rounded h-9 text-neutral-500 divide-neutral-200 border-neutral-200">
                            <li class="h-full">
                              <button
                                type="button"
                                class="relative inline-flex items-center h-full px-3 ml-0 rounded-l group hover:text-neutral-900 disabled:opacity-50 disabled:cursor-not-allowed"
                                @click="goPreviewPrev()"
                                :disabled="previewLoading || previewPage <= 1 || previewTotalPages === 0"
                              >
                                <span>Previous</span>
                              </button>
                            </li>
                            <template x-for="(item, idx) in previewPageItems" :key="`preview-page-${idx}-${item}`">
                              <li class="hidden h-full md:block">
                                <template x-if="item === 'ellipsis'">
                                  <div class="relative inline-flex items-center h-full px-2.5 group">
                                    <span>...</span>
                                  </div>
                                </template>
                                <template x-if="item !== 'ellipsis'">
                                  <button
                                    type="button"
                                    class="relative inline-flex items-center h-full px-3 group hover:text-neutral-900"
                                    :class="Number(item) === previewPage ? 'text-neutral-900 bg-gray-50' : ''"
                                    @click="loadPreviewPage(Number(item))"
                                    :disabled="previewLoading"
                                  >
                                    <span x-text="item"></span>
                                    <span
                                      class="box-content absolute bottom-0 w-0 h-px -mx-px duration-200 ease-out translate-y-px border-transparent bg-neutral-900 group-hover:border-l group-hover:border-r group-hover:border-neutral-900 left-1/2 group-hover:left-0 group-hover:w-full"
                                      :class="Number(item) === previewPage ? 'left-0 w-full border-l border-r border-neutral-900' : ''"
                                    ></span>
                                  </button>
                                </template>
                              </li>
                            </template>
                            <li class="h-full">
                              <button
                                type="button"
                                class="relative inline-flex items-center h-full px-3 rounded-r group hover:text-neutral-900 disabled:opacity-50 disabled:cursor-not-allowed"
                                @click="goPreviewNext()"
                                :disabled="previewLoading || previewPage >= previewTotalPages || previewTotalPages === 0"
                              >
                                <span>Next</span>
                              </button>
                            </li>
                          </ul>
                        </nav>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </main>

        <div
          class="border-t border-slate-200 bg-slate-50/70 px-4 py-2"
          :class="switchOn ? 'border-slate-700 bg-slate-900/50' : ''"
          x-show="showRuntimeProgress"
          x-transition.opacity.duration.250ms
          x-cloak
        >
          <div class="mb-1 flex items-center justify-between text-[11px] font-medium">
            <span x-text="runtimeProgressLabel"></span>
            <span x-text="`${runtimeProgress}%`"></span>
          </div>
          <div class="runtime-progress-track">
            <span class="runtime-progress-fill" :style="`width:${runtimeProgress}%`"></span>
          </div>
        </div>

        <footer class="flex items-center justify-between border-t border-slate-200 bg-slate-50 px-4 py-2 text-xs text-slate-500">
          <div class="flex items-center gap-3">
            <span
              class="rounded-full px-2 py-0.5 font-semibold tracking-[0.18em]"
              :class="pythonReady ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'"
              x-text="pythonReady ? 'Python ready' : 'Python loading'"
            ></span>
            
            <span x-text="yamlText.split('\n').length + ' lines'"></span>
          </div>

        </footer>
      </div>
    </div>

    <script type="py" src="./python/bridge.py" config="./pyscript.toml"></script>
    <script src="./app.js"></script>
  </body>
</html>
