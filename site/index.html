<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clinical-contract</title>
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
    <script src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.10.2/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.10.2/core.js"></script>
    <link rel="stylesheet" href="./css/tailwind.css" />
  </head>
  <body>
    <div x-data="clinicalApp()" x-init="init()" class="app-root" :class="switchOn ? 'app-root--dark' : ''">
      <div class="app-frame" :class="switchOn ? 'theme-dark page-night' : ''">
        <!-- Header: brand, runtime-independent controls, and theme switch. -->
        <header class="pine-header">
          <div class="pine-brand">
            <div class="pine-logo-box">
              <img :src="logoSrc" :alt="logoAlt" class="pine-logo-image" @error="handleLogoError" />
            </div>
            <div class="pine-brand-row">
              <h1 class="pine-brand-title">clinical-contract</h1>
              <span class="pine-badge">beta</span>
            </div>
          </div>

          <div class="pine-theme-toggle">
            <input id="theme-switch" type="checkbox" name="theme-switch" class="sr-only" :checked="switchOn" />
            <button
              x-ref="switchButton"
              type="button"
              @click="toggleThemeSwitch()"
              :class="switchOn ? 'pine-theme-switch pine-theme-switch--on' : 'pine-theme-switch pine-theme-switch--off'"
              x-cloak
            >
              <span :class="switchOn ? 'pine-theme-switch__thumb pine-theme-switch__thumb--on' : 'pine-theme-switch__thumb pine-theme-switch__thumb--off'"></span>
            </button>
            <label
              @click="$refs.switchButton.click(); $refs.switchButton.focus()"
              for="theme-switch"
              :class="switchOn ? 'pine-theme-switch-label pine-theme-switch-label--on' : 'pine-theme-switch-label pine-theme-switch-label--off'"
              x-cloak
            >
              <span x-text="switchOn ? 'Light' : 'Dark'"></span>
            </label>
          </div>
        </header>

        <!-- Main workspace: resizable contract editor and data checker. -->
        <main class="app-main">
          <div
            x-ref="appGrid"
            :class="editorView === 'schema' ? 'app-grid app-grid--schema' : 'app-grid'"
            :style="splitGridStyle()"
          >
            <!-- Left panel: YAML editor plus visual contract builder. -->
            <section class="panel panel--editor">
              <div class="panel-head">
                <div>
                  <div class="panel-eyebrow">Editor</div>
                  <div class="panel-title" x-text="yamlName || 'Untitled contract'"></div>
                </div>
                <div class="pine-toolbar">
                  <div class="view-switch">
                    <button type="button" :class="editorModeButtonClass('schema')" @click="setEditorView('schema')">Schema</button>
                    <button type="button" :class="editorModeButtonClass('yaml')" @click="setEditorView('yaml')">YAML</button>
                  </div>
                  <button type="button" @click="$refs.yamlInput.click()" class="pine-btn">Load contract</button>
                  <input x-ref="yamlInput" type="file" class="sr-only" accept=".yaml,.yml" @change="importYaml($event)" />
                  <button type="button" @click="downloadYaml()" class="pine-btn">Download contract</button>
                  <button type="button" @click="validateContract()" :disabled="busy || !pythonReady" class="pine-btn pine-btn--primary">Validate</button>
                </div>
              </div>

              <!-- YAML mode: plain code editor optimized for manual contract editing. -->
              <template x-if="editorView === 'yaml'">
                <div class="editor-wrap" @dragover.prevent @drop.prevent="dropYaml($event)">
                  <div class="editor-gutter" aria-hidden="true">
                    <template x-for="line in lineNumbers" :key="line">
                      <div class="editor-line-number" x-text="line"></div>
                    </template>
                  </div>
                  <textarea
                    id="yaml-editor"
                    x-ref="yamlEditor"
                    x-model="yamlText"
                    @input.debounce.350ms="syncSchemaFromYamlEditor()"
                    @scroll="syncEditorScroll($event)"
                    @keydown="handleEditorKeydown($event)"
                    spellcheck="false"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    class="editor-textarea"
                    placeholder="Drop a YAML data contract here."
                  ></textarea>
                </div>
              </template>

              <!-- Schema mode: guided builder that keeps the YAML as the source of truth. -->
              <template x-if="editorView === 'schema'">
                <div class="schema-editor">
                  <div
                    x-show="schemaParseWarning"
                    x-cloak
                    class="schema-warning border border-amber-200 bg-amber-50 px-3 py-2 text-xs text-amber-800"
                    x-text="schemaParseWarning"
                  ></div>

                  <template x-if="!schemaStarted">
                    <div class="schema-empty">
                      <div class="schema-empty-card">
                        <div class="schema-empty-kicker">New data contract</div>
                        <h2 class="schema-empty-title">Start with a blank schema</h2>
                        <p class="schema-empty-copy">
                          Build your contract step by step, or load the example contract to inspect a complete setup.
                        </p>
                        <div class="schema-empty-actions">
                          <button type="button" class="pine-btn pine-btn--primary" @click="startBlankContract()">Add schema</button>
                          <button type="button" class="pine-btn" @click="loadExampleContract()">Load example</button>
                        </div>
                      </div>
                    </div>
                  </template>

                  <div class="schema-workflow" x-show="schemaStarted" x-cloak>
                    <!-- Builder navigation: high-level contract sections. -->
                    <aside class="schema-nav">
                      <div class="schema-nav-head">
                        <div class="schema-nav-title">Write contract</div>
                      </div>

                      <nav class="schema-nav-list">
                        <template x-for="section in schemaSections" :key="`schema-section-${section.id}`">
                          <button type="button" :class="schemaSectionClass(section.id)" @click="setSchemaSection(section.id)">
                            <span class="schema-nav-copy">
                              <span class="schema-nav-item-title" x-text="section.title"></span>
                            </span>
                          </button>
                        </template>
                      </nav>

                      <div class="schema-nav-footer">
                        <button type="button" class="schema-reset-button" @click.stop.prevent="resetContractModalOpen = true">Reset contract</button>
                      </div>
                   </aside>

                    <section class="schema-workspace">
                      <!-- Fundamentals: contract identity and business description. -->
                      <div class="schema-card schema-stage" x-show="schemaSection === 'fundamentals'" x-cloak>
                        <div class="schema-stage-bar">
                          <div>
                            <div class="schema-stage-title">Fundamentals</div>
                          </div>
                        </div>
                        <div class="schema-business-stack">
                          <label class="space-y-1">
                            <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Contract ID <span class="schema-required" x-show="showRequiredFor('id')" x-cloak>* required</span></span>
                            <input type="text" x-model="schemaDraft.id" @input.debounce.200ms="pushSchemaToYaml()" :class="requiredInputClass('id')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" />
                          </label>
                          <label class="space-y-1">
                            <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Contract Name <span class="schema-required" x-show="showRequiredFor('name')" x-cloak>* required</span></span>
                            <input type="text" x-model="schemaDraft.name" @input.debounce.200ms="pushSchemaToYaml()" :class="requiredInputClass('name')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" />
                          </label>
                          <label class="space-y-1 schema-wide-field">
                            <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Purpose <span class="schema-required" x-show="showRequiredFor('descriptionPurpose')" x-cloak>* required</span></span>
                            <textarea x-model="schemaDraft.descriptionPurpose" @input.debounce.250ms="pushSchemaToYaml()" rows="2" :class="requiredInputClass('descriptionPurpose')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" placeholder="Why this dataset exists"></textarea>
                          </label>
                          <label class="space-y-1 schema-wide-field">
                            <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Usage <span class="schema-required" x-show="showRequiredFor('descriptionUsage')" x-cloak>* required</span></span>
                            <textarea x-model="schemaDraft.descriptionUsage" @input.debounce.250ms="pushSchemaToYaml()" rows="2" :class="requiredInputClass('descriptionUsage')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" placeholder="How consumers should use it"></textarea>
                          </label>
                          <label class="space-y-1 schema-wide-field">
                            <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Limitations <span class="schema-required" x-show="showRequiredFor('descriptionLimitations')" x-cloak>* required</span></span>
                            <textarea x-model="schemaDraft.descriptionLimitations" @input.debounce.250ms="pushSchemaToYaml()" rows="2" :class="requiredInputClass('descriptionLimitations')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" placeholder="Known caveats, scope, or historical issues"></textarea>
                          </label>
                          <details class="schema-advanced schema-wide-field" :open="hasAdvancedRequiredHints()">
                            <summary>Advanced contract metadata</summary>
                            <div class="schema-advanced-grid">
                              <label class="space-y-1">
                                <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">API Version <span class="schema-required" x-show="showRequiredFor('apiVersion')" x-cloak>* required</span></span>
                                <input type="text" x-model="schemaDraft.apiVersion" @input.debounce.200ms="pushSchemaToYaml()" :class="requiredInputClass('apiVersion')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" />
                              </label>
                              <label class="space-y-1">
                                <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Kind <span class="schema-required" x-show="showRequiredFor('kind')" x-cloak>* required</span></span>
                                <input type="text" x-model="schemaDraft.kind" @input.debounce.200ms="pushSchemaToYaml()" :class="requiredInputClass('kind')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" />
                              </label>
                              <label class="space-y-1">
                                <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Version <span class="schema-required" x-show="showRequiredFor('version')" x-cloak>* required</span></span>
                                <input type="text" x-model="schemaDraft.version" @input.debounce.200ms="pushSchemaToYaml()" :class="requiredInputClass('version')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" />
                              </label>
                              <label class="space-y-1">
                                <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Status <span class="schema-required" x-show="showRequiredFor('status')" x-cloak>* required</span></span>
                                <input type="text" x-model="schemaDraft.status" @input.debounce.200ms="pushSchemaToYaml()" :class="requiredInputClass('status')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" />
                              </label>
                            </div>
                          </details>
                        </div>
                      </div>

                      <!-- Schema: table metadata and column definitions. -->
                      <div class="schema-card schema-stage" x-show="schemaSection === 'schema'" x-cloak>
                        <div class="schema-stage-bar">
                          <div>
                            <div class="schema-stage-title">Schema</div>
                          </div>
                        </div>
                        <div class="grid gap-3 md:grid-cols-[minmax(12rem,0.8fr)_minmax(18rem,1.2fr)]">
                          <label class="space-y-1">
                            <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Table Name <span class="schema-required" x-show="showRequiredFor('tableName')" x-cloak>* required</span></span>
                            <input type="text" x-model="schemaDraft.tableName" @input.debounce.150ms="pushSchemaToYaml()" :class="requiredInputClass('tableName')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" />
                          </label>
                          <label class="space-y-1">
                            <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Description <span class="schema-required" x-show="showRequiredFor('tableDescription')" x-cloak>* required</span></span>
                            <input type="text" x-model="schemaDraft.tableDescription" @input.debounce.150ms="pushSchemaToYaml()" :class="requiredInputClass('tableDescription')" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" />
                          </label>
                        </div>

                        <div class="schema-subsection-bar mt-5 flex items-center justify-between border-t pt-4">
                          <div class="schema-stage-title">Columns</div>
                        </div>

                        <div class="column-list-shell mt-3">
                          <template x-if="schemaDraft.properties.length === 0">
                            <div class="column-empty">
                              Add a column, then edit its type and description from the details panel.
                            </div>
                          </template>
                          <table x-show="schemaDraft.properties.length > 0" x-cloak class="column-table">
                            <thead>
                              <tr>
                                <th>Column</th>
                                <th>Type</th>
                                <th>Required</th>
                                <th>Description</th>
                                <th class="text-right">Action</th>
                              </tr>
                            </thead>
                            <tbody>
                              <template x-for="row in schemaDraft.properties" :key="row._rowId">
                                <tr class="column-table__row" @click="openSchemaProperty(row._rowId)" tabindex="0" @keydown.enter.prevent="openSchemaProperty(row._rowId)">
                                  <td class="column-table__column">
                                    <span x-text="row.name || 'Unnamed column'"></span>
                                    <span class="schema-required" x-show="showRequiredFor('propertyName', row)" x-cloak>* required</span>
                                  </td>
                                  <td class="column-table__type">
                                    <span x-text="columnTypeSummary(row)"></span>
                                    <span class="schema-required" x-show="showRequiredFor('propertyLogicalType', row)" x-cloak>* required</span>
                                  </td>
                                  <td class="column-table__required" x-text="row.required ? 'Yes' : 'No'"></td>
                                  <td class="column-table__description" x-text="row.description || 'No description yet'"></td>
                                  <td class="column-table__action">
                                    <button type="button" class="column-edit-button" @click.stop.prevent="openSchemaProperty(row._rowId)">Edit</button>
                                  </td>
                                </tr>
                              </template>
                            </tbody>
                          </table>
                        </div>
                        <div class="schema-add-row">
                          <button type="button" class="schema-add-btn" @click="addSchemaProperty()">Add column</button>
                        </div>
                      </div>

                      <template x-if="schemaEditorProperty()">
                        <div
                          class="entity-modal-backdrop"
                          @keydown.escape.window="closeSchemaProperty()"
                        >
                          <div class="entity-modal" x-data="{ row: schemaEditorProperty() }" @click.outside="closeSchemaProperty()">
                            <div class="entity-modal__header">
                              <div>
                                <div class="entity-modal__kicker">Column details</div>
                                <div class="entity-modal__title" x-text="row.name || 'Unnamed column'"></div>
                              </div>
                            </div>

                            <div class="entity-modal__body">
                              <label class="entity-modal__field">
                                <span class="entity-modal__label">Column name <span class="schema-required" x-show="showRequiredFor('propertyName', row)" x-cloak>* required</span></span>
                                <input type="text" x-model="row.name" @input.debounce.150ms="pushSchemaToYaml()" :class="requiredInputClass('propertyName', row)" class="schema-input" placeholder="column_name" />
                              </label>

                              <label class="entity-modal__field column-required-field">
                                <span class="entity-modal__label">Required</span>
                                <input type="checkbox" x-model="row.required" @change="pushSchemaToYaml()" class="column-required-checkbox" />
                              </label>

                              <label class="entity-modal__field">
                                <span class="entity-modal__label">Logical type <span class="schema-required" x-show="showRequiredFor('propertyLogicalType', row)" x-cloak>* required</span></span>
                                <select
                                  :value="row.logicalType || ''"
                                  @change="row.logicalType = $event.target.value; onLogicalTypeChanged(row)"
                                  x-effect="row.logicalType; $nextTick(() => { $el.value = row.logicalType || '' })"
                                  :class="requiredInputClass('propertyLogicalType', row)"
                                  class="schema-input"
                                >
                                  <option value="">Not specified</option>
                                  <template x-for="logicalType in getLogicalTypeOptions(row)" :key="`logical-modal-${row._rowId}-${logicalType}`">
                                    <option :value="logicalType" x-text="logicalType"></option>
                                  </template>
                                </select>
                              </label>

                              <label class="entity-modal__field">
                                <span class="entity-modal__label">Physical type <span class="schema-required" x-show="showRequiredFor('propertyPhysicalType', row)" x-cloak>* required</span></span>
                                <select
                                  :value="row.physicalType || ''"
                                  @change="row.physicalType = $event.target.value; onPhysicalTypeChanged(row)"
                                  x-effect="row.physicalType; $nextTick(() => { $el.value = row.physicalType || '' })"
                                  :class="requiredInputClass('propertyPhysicalType', row)"
                                  class="schema-input"
                                >
                                  <option value="">Not specified</option>
                                  <template x-for="physicalType in getPhysicalTypeOptions(row)" :key="`physical-modal-${row._rowId}-${physicalType}`">
                                    <option :value="physicalType" x-text="physicalType"></option>
                                  </template>
                                </select>
                              </label>

                              <label class="entity-modal__field entity-modal__field--wide column-description-field">
                                <span class="entity-modal__label">Description <span class="schema-required" x-show="showRequiredFor('propertyDescription', row)" x-cloak>* required</span></span>
                                <textarea x-model="row.description" @input.debounce.150ms="pushSchemaToYaml()" :class="requiredInputClass('propertyDescription', row)" rows="5" class="schema-input schema-input--description column-description-textarea" placeholder="Example: Patient identifier used to link healthcare records across hospital stays."></textarea>
                              </label>
                            </div>

                            <div class="entity-modal__footer">
                              <button type="button" class="entity-modal__remove" @click="removeSchemaProperty(row._rowId)">Remove column</button>
                              <button type="button" class="pine-btn pine-btn--primary" @click="closeSchemaProperty()">Done</button>
                            </div>
                          </div>
                        </div>
                      </template>

                      <!-- Quality: SQL checks attached to contract columns. -->
                      <div class="schema-card schema-stage" x-show="schemaSection === 'quality'" x-cloak>
                        <div class="schema-stage-bar">
                          <div>
                            <div class="schema-stage-title">Quality</div>
                          </div>
                        </div>
                        <div class="quality-list-shell">
                          <template x-if="schemaDraft.qualityRules.length === 0">
                            <div class="quality-empty">
                              Add at least one named column, then create SQL quality checks here.
                            </div>
                          </template>
                          <table x-show="schemaDraft.qualityRules.length > 0" x-cloak class="quality-table">
                            <thead>
                              <tr>
                                <th>Column</th>
                                <th>Description</th>
                                <th class="text-right">Action</th>
                              </tr>
                            </thead>
                            <tbody>
                              <template x-for="rule in schemaDraft.qualityRules" :key="rule._rowId">
                                <tr class="quality-table__row" @click="openQualityRule(rule._rowId)" tabindex="0" @keydown.enter.prevent="openQualityRule(rule._rowId)">
                                  <td class="quality-table__column" x-text="rule.propertyName || 'No column selected'"></td>
                                  <td class="quality-table__description" x-text="rule.description || 'Untitled quality check'"></td>
                                  <td class="quality-table__action">
                                    <button type="button" class="quality-edit-button" @click.stop.prevent="openQualityRule(rule._rowId)">Edit</button>
                                  </td>
                                </tr>
                              </template>
                            </tbody>
                          </table>
                        </div>
                        <div class="schema-add-row">
                          <button type="button" class="schema-add-btn" @click="addQualityRule()" :disabled="!schemaDraft.properties.some((property) => property.name)">Add check</button>
                        </div>
                      </div>

                      <template x-if="qualityEditorRule()">
                        <div
                          class="entity-modal-backdrop"
                          @keydown.escape.window="closeQualityRule()"
                        >
                          <div class="entity-modal" x-data="{ rule: qualityEditorRule() }" @click.outside="closeQualityRule()">
                            <div class="entity-modal__header">
                              <div>
                                <div class="entity-modal__kicker">Quality check</div>
                                <div class="entity-modal__title" x-text="rule.description || 'Untitled quality check'"></div>
                              </div>
                            </div>

                            <div class="entity-modal__body">
                              <label class="entity-modal__field">
                                <span class="entity-modal__label">Column</span>
                                <select x-model="rule.propertyName" @change="pushSchemaToYaml()" class="schema-input">
                                  <template x-for="property in schemaDraft.properties" :key="`entity-modal-property-${rule._rowId}-${property._rowId}`">
                                    <option :value="property.name" x-text="property.name || 'Unnamed column'"></option>
                                  </template>
                                </select>
                              </label>

                              <label class="entity-modal__field">
                                <span class="entity-modal__label">Expected result</span>
                                <input type="number" x-model.number="rule.mustBe" @input.debounce.150ms="pushSchemaToYaml()" class="schema-input" />
                              </label>

                              <label class="entity-modal__field entity-modal__field--wide">
                                <span class="entity-modal__label">Description</span>
                                <textarea x-model="rule.description" @input.debounce.150ms="pushSchemaToYaml()" rows="3" class="schema-input schema-input--description" placeholder="Explain what this quality check protects"></textarea>
                              </label>

                              <label class="entity-modal__field entity-modal__field--wide">
                                <span class="entity-modal__label">SQL query</span>
                                <div class="quality-sql-editor">
                                  <div class="quality-sql-editor__bar">
                                    <span>DuckDB SQL</span>
                                    <span class="quality-sql-editor__table-hint">
                                      <span class="quality-sql-editor__table-label">Table name:</span>
                                      <span class="quality-sql-editor__table-name" x-text="schemaDraft.tableName || 'data'"></span>
                                    </span>
                                  </div>
                                  <textarea x-model="rule.query" @input.debounce.200ms="pushSchemaToYaml()" rows="8" class="quality-sql-editor__textarea" spellcheck="false" placeholder="select count(*) from data where ..."></textarea>
                                </div>
                              </label>
                            </div>

                            <div class="entity-modal__footer">
                              <button type="button" class="entity-modal__remove" @click="removeQualityRule(rule._rowId)">Remove check</button>
                              <button type="button" class="pine-btn pine-btn--primary" @click="closeQualityRule()">Done</button>
                            </div>
                          </div>
                        </div>
                      </template>

                      <!-- Reset confirmation: prevents accidental draft deletion. -->
                      <template x-if="resetContractModalOpen">
                        <div
                          class="entity-modal-backdrop"
                          @keydown.escape.window="closeResetContractModal()"
                        >
                          <div class="reset-modal" @click.outside="closeResetContractModal()">
                            <div class="reset-modal__header">
                              <div>
                                <div class="entity-modal__kicker">Reset contract</div>
                                <div class="reset-modal__title">Delete the current draft?</div>
                              </div>
                            </div>

                            <div class="reset-modal__body">
                              <p>
                                This will remove the contract currently being edited in the builder and return to the start screen.
                                You can download the YAML first if you want to keep a local copy.
                              </p>
                            </div>

                            <div class="reset-modal__footer">
                              <button type="button" class="pine-btn" @click="downloadYaml()" :disabled="!yamlText.trim()">Download draft</button>
                              <div class="reset-modal__actions">
                                <button type="button" class="pine-btn" @click="closeResetContractModal()">Cancel</button>
                                <button type="button" class="reset-modal__danger" @click="resetContractDraft()">Reset contract</button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </template>

                      <!-- Team: ownership metadata and members. -->
                      <div class="schema-card schema-stage" x-show="schemaSection === 'team'" x-cloak>
                        <div class="schema-stage-bar">
                          <div>
                            <div class="schema-stage-title">Team</div>
                          </div>
                        </div>
                        <div class="grid gap-3 md:grid-cols-2">
                          <label class="space-y-1">
                            <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Team Name</span>
                            <input type="text" x-model="schemaDraft.teamName" @input.debounce.150ms="pushSchemaToYaml()" class="schema-input w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" />
                          </label>
                          <label class="space-y-1">
                            <span class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Description</span>
                            <input type="text" x-model="schemaDraft.teamDescription" @input.debounce.150ms="pushSchemaToYaml()" class="schema-input schema-input--description w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none focus:border-blue-500" />
                          </label>
                        </div>
                        <div class="schema-subsection-bar mt-5 flex items-center justify-between border-t pt-4">
                          <div class="schema-stage-title">Members</div>
                        </div>
                        <div class="team-list-shell mt-3">
                          <template x-if="schemaDraft.teamMembers.length === 0">
                            <div class="team-empty">
                              No team members yet.
                            </div>
                          </template>
                          <table x-show="schemaDraft.teamMembers.length > 0" x-cloak class="team-table">
                            <thead>
                              <tr>
                                <th>Name</th>
                                <th>Role</th>
                                <th class="text-right">Action</th>
                              </tr>
                            </thead>
                            <tbody>
                              <template x-for="member in schemaDraft.teamMembers" :key="member._rowId">
                                <tr class="team-table__row" @click="openTeamMember(member._rowId)" tabindex="0" @keydown.enter.prevent="openTeamMember(member._rowId)">
                                  <td class="team-table__name" x-text="member.name || 'Unnamed member'"></td>
                                  <td class="team-table__role" x-text="member.role || 'No role specified'"></td>
                                  <td class="team-table__action">
                                    <button type="button" class="team-edit-button" @click.stop.prevent="openTeamMember(member._rowId)">Edit</button>
                                  </td>
                                </tr>
                              </template>
                            </tbody>
                          </table>
                        </div>
                        <div class="schema-add-row">
                          <button type="button" class="schema-add-btn" @click="addTeamMember()">Add member</button>
                        </div>
                      </div>

                      <template x-if="teamEditorMember()">
                        <div
                          class="entity-modal-backdrop"
                          @keydown.escape.window="closeTeamMember()"
                        >
                          <div class="entity-modal" x-data="{ member: teamEditorMember() }" @click.outside="closeTeamMember()">
                            <div class="entity-modal__header">
                              <div>
                                <div class="entity-modal__kicker">Team member</div>
                                <div class="entity-modal__title" x-text="member.name || 'Unnamed member'"></div>
                              </div>
                            </div>

                            <div class="entity-modal__body">
                              <label class="entity-modal__field">
                                <span class="entity-modal__label">Name</span>
                                <input type="text" x-model="member.name" @input.debounce.150ms="pushSchemaToYaml()" class="schema-input team-member-input" placeholder="Jane Doe" />
                              </label>

                              <label class="entity-modal__field">
                                <span class="entity-modal__label">Role</span>
                                <input type="text" x-model="member.role" @input.debounce.150ms="pushSchemaToYaml()" class="schema-input team-member-input" placeholder="Data owner" />
                              </label>

                              <label class="entity-modal__field entity-modal__field--wide">
                                <span class="entity-modal__label">Email</span>
                                <input type="email" x-model="member.email" @input.debounce.150ms="pushSchemaToYaml()" class="schema-input team-member-input" placeholder="jane.doe@example.org" />
                              </label>
                            </div>

                            <div class="entity-modal__footer">
                              <button type="button" class="entity-modal__remove" @click="removeTeamMember(member._rowId)">Remove member</button>
                              <button type="button" class="pine-btn pine-btn--primary" @click="closeTeamMember()">Done</button>
                            </div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
            </section>

            <button
              type="button"
              class="split-resizer"
              :class="splitDragging ? 'split-resizer--active' : ''"
              @pointerdown.prevent="startSplitResize($event)"
              @dblclick.prevent="resetSplitPane()"
              @keydown="handleSplitKeydown($event)"
              role="separator"
              aria-label="Resize editor and checker panels"
              aria-orientation="vertical"
              :aria-valuenow="Math.round(splitPercent)"
              aria-valuemin="35"
              aria-valuemax="75"
            >
              <span class="split-resizer__handle" aria-hidden="true"></span>
            </button>

            <!-- Right panel: data loading, validation results, checks, and preview. -->
            <section class="panel">
              <div class="panel-head">
                <div>
                  <div class="panel-eyebrow">Checker</div>
                  <div class="panel-title" x-text="dataFileName || 'Drop a parquet/csv file'"></div>
                </div>
                <div class="pine-toolbar">
                  <div class="data-meta-stack" x-show="dataStatsText() || dataFileSizeText()" x-cloak>
                    <div class="data-stats" x-show="dataStatsText()" x-text="dataStatsText()"></div>
                    <div class="data-file-size" x-show="dataFileSizeText()" x-text="dataFileSizeText()"></div>
                  </div>
                  <button type="button" @click="$refs.dataInput.click()" class="pine-btn">Load data</button>
                  <input x-ref="dataInput" type="file" class="sr-only" accept=".parquet,.csv" @change="pickDataFile($event)" />
                  <button type="button" @click="runCheck()" :disabled="busy || !pythonReady || !dataFile" class="pine-btn pine-btn--success">Run checks</button>
                </div>
              </div>

              <div class="checker-body">
                <!-- Dataset input: CSV/Parquet drag-and-drop and file picker. -->
                <div
                  class="dropzone"
                  :class="draggingData ? 'dropzone--active' : ''"
                  @dblclick="$refs.dataInput.click()"
                  @dragenter.prevent="draggingData = true"
                  @dragover.prevent="draggingData = true"
                  @dragleave.prevent="draggingData = false"
                  @drop.prevent="dropData($event)"
                >
                  <div class="dropzone-content">
                    <div class="dropzone-icon-wrap" aria-hidden="true">
                      <svg xmlns="http://www.w3.org/2000/svg" class="dropzone-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 16V4m0 0l-4 4m4-4l4 4M4 16.5v1.25A2.25 2.25 0 006.25 20h11.5A2.25 2.25 0 0020 17.75V16.5" />
                      </svg>
                    </div>
                    <div>
                      <div class="dropzone-title">Drag and drop parquet or csv here</div>
                      <div class="dropzone-subtitle">Or use "Load data" to pick a local file.</div>
                    </div>
                  </div>
                  <div class="dropzone-filename" x-text="dataFileName || 'No file selected'"></div>
                </div>

                <!-- Results: validate, schema, quality, and paginated dataset preview. -->
                <div class="results-shell">
                  <div class="pine-tabs">
                    <button type="button" class="pine-tab" :class="activeTab === 'validate' ? 'pine-tab--active' : ''" @click="activeTab = 'validate'">
                      <span class="pine-tab-label">
                        <span class="tab-dot" :class="tabDotClass(validateTabState)"></span>
                        <span>Validate</span>
                      </span>
                    </button>
                    <button type="button" class="pine-tab" :class="activeTab === 'schema' ? 'pine-tab--active' : ''" @click="activeTab = 'schema'">
                      <span class="pine-tab-label">
                        <span class="tab-dot" :class="tabDotClass(schemaTabState)"></span>
                        <span>Schema</span>
                      </span>
                    </button>
                    <button type="button" class="pine-tab" :class="activeTab === 'quality' ? 'pine-tab--active' : ''" @click="activeTab = 'quality'">
                      <span class="pine-tab-label">
                        <span class="tab-dot" :class="tabDotClass(qualityTabState)"></span>
                        <span>Quality</span>
                      </span>
                    </button>
                    <button
                      type="button"
                      class="pine-tab pine-tab--preview"
                      :class="activeTab === 'preview' ? 'pine-tab--active' : ''"
                      @click="activeTab = 'preview'"
                      x-show="dataFile"
                      x-cloak
                    >
                      <span>Preview</span>
                    </button>
                  </div>

                  <div class="results-table-wrap" x-show="activeTab === 'validate'" x-cloak>
                    <table class="results-table">
                      <thead>
                        <tr>
                          <th>Field</th>
                          <th>Status</th>
                          <th>Value</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-if="validateRows.length === 0">
                          <tr><td colspan="3" class="empty-row">No validation result yet.</td></tr>
                        </template>
                        <template x-for="row in validateRows" :key="row.field">
                          <tr>
                            <td x-text="row.field"></td>
                            <td>
                              <span class="status-chip" :class="statusChipClass(row.status)">
                                <span class="status-dot" :class="statusDotClass(row.status)"></span>
                                <span x-text="row.status"></span>
                              </span>
                            </td>
                            <td x-text="row.value"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                  <div class="results-table-wrap" x-show="activeTab === 'schema'" x-cloak>
                    <table class="results-table">
                      <thead>
                        <tr>
                          <th>Schema</th>
                          <th>Column</th>
                          <th>Required</th>
                          <th>Expected</th>
                          <th>Detected</th>
                          <th>Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-if="schemaRows.length === 0">
                          <tr><td colspan="6" class="empty-row">No schema result yet.</td></tr>
                        </template>
                        <template x-for="(row, idx) in schemaRows" :key="`${row.schema_name}-${row.column}-${idx}`">
                          <tr>
                            <td x-text="row.schema_name"></td>
                            <td x-text="row.column"></td>
                            <td x-text="row.required === true ? 'true' : row.required === false ? 'false' : 'missing'"></td>
                            <td x-text="row.yaml_type"></td>
                            <td x-text="row.parquet_type"></td>
                            <td>
                              <span class="status-chip" :class="statusChipClass(row.status)">
                                <span class="status-dot" :class="statusDotClass(row.status)"></span>
                                <span x-text="row.status"></span>
                              </span>
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                  <div class="results-table-wrap" x-show="activeTab === 'quality'" x-cloak>
                    <table class="results-table">
                      <thead>
                        <tr>
                          <th>Schema</th>
                          <th>Column</th>
                          <th>Rule</th>
                          <th>Obtained</th>
                          <th>Expected</th>
                          <th>Result</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-if="qualityRows.length === 0">
                          <tr><td colspan="6" class="empty-row">No quality result yet.</td></tr>
                        </template>
                        <template x-for="(row, idx) in qualityRows" :key="`${row.property_name}-${idx}`">
                          <tr>
                            <td x-text="row.schema_name"></td>
                            <td x-text="row.property_name"></td>
                            <td x-text="row.description"></td>
                            <td x-text="row.obtained"></td>
                            <td x-text="row.expected"></td>
                            <td>
                              <span class="status-chip" :class="statusChipClass(row.status)">
                                <span class="status-dot" :class="statusDotClass(row.status)"></span>
                                <span x-text="row.status"></span>
                              </span>
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                  <div class="results-table-wrap results-table-wrap--preview" x-show="activeTab === 'preview'" x-cloak>
                    <div class="preview-layout">
                      <div class="preview-scroll">
                        <table class="preview-table">
                          <thead>
                            <tr>
                              <template x-if="previewColumns.length === 0">
                                <th class="preview-th preview-th--single">Data preview</th>
                              </template>
                              <template x-for="(columnName, idx) in previewColumns" :key="`preview-col-${idx}`">
                                <th class="preview-th" :class="idx === 0 ? 'preview-th--first' : ''" :title="columnName" x-text="columnName"></th>
                              </template>
                            </tr>
                          </thead>
                          <tbody>
                            <template x-if="previewLoading">
                              <tr>
                                <td class="preview-empty" :colspan="Math.max(1, previewColumns.length)">Loading preview page...</td>
                              </tr>
                            </template>
                            <template x-if="!previewLoading && previewError">
                              <tr>
                                <td class="preview-empty preview-empty--error" :colspan="Math.max(1, previewColumns.length)" x-text="previewError"></td>
                              </tr>
                            </template>
                            <template x-if="!previewLoading && !previewError && previewRows.length === 0">
                              <tr>
                                <td class="preview-empty" :colspan="Math.max(1, previewColumns.length)">No preview rows yet. Load a data file to inspect rows.</td>
                              </tr>
                            </template>
                            <template x-for="(row, rowIdx) in previewRows" :key="`preview-row-${rowIdx}`">
                              <tr>
                                <template x-for="(cell, cellIdx) in row" :key="`preview-cell-${rowIdx}-${cellIdx}`">
                                  <td class="preview-td" :class="cellIdx === 0 ? 'preview-td--first' : ''">
                                    <div class="preview-cell" :title="cell === null ? 'null' : String(cell)" x-text="cell === null ? 'null' : String(cell)"></div>
                                  </td>
                                </template>
                              </tr>
                            </template>
                          </tbody>
                        </table>
                      </div>

                      <div class="preview-pagination" x-show="!previewError" x-cloak>
                        <p class="preview-pagination__meta">
                          Showing <span x-text="previewStartRow"></span> to <span x-text="previewEndRow"></span> of
                          <span x-text="previewTotalRows"></span> results
                        </p>
                        <nav>
                          <ul class="pager">
                            <li>
                              <button type="button" class="pager-btn" @click="goPreviewPrev()" :disabled="previewLoading || previewPage <= 1 || previewTotalPages === 0">Previous</button>
                            </li>
                            <template x-for="(item, idx) in previewPageItems" :key="`preview-page-${idx}-${item}`">
                              <li class="pager-item--desktop">
                                <template x-if="item === 'ellipsis'">
                                  <span class="pager-ellipsis">...</span>
                                </template>
                                <template x-if="item !== 'ellipsis'">
                                  <button
                                    type="button"
                                    class="pager-btn"
                                    :class="Number(item) === previewPage ? 'pager-btn--active' : ''"
                                    @click="loadPreviewPage(Number(item))"
                                    :disabled="previewLoading"
                                    x-text="item"
                                  ></button>
                                </template>
                              </li>
                            </template>
                            <li>
                              <button type="button" class="pager-btn" @click="goPreviewNext()" :disabled="previewLoading || previewPage >= previewTotalPages || previewTotalPages === 0">Next</button>
                            </li>
                          </ul>
                        </nav>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </main>

        <!-- Runtime progress: PyScript/Pyodide boot feedback. -->
        <div class="runtime-progress" x-show="showRuntimeProgress" x-transition.opacity.duration.250ms x-cloak>
          <div class="runtime-progress__meta">
            <span x-text="runtimeProgressLabel"></span>
            <span x-text="`${runtimeProgress}%`"></span>
          </div>
          <div class="runtime-progress-track">
            <span class="runtime-progress-fill" :style="`width:${runtimeProgress}%`"></span>
          </div>
        </div>

        <!-- Footer: compact runtime status and editor metadata. -->
        <footer class="app-footer">
          <div class="footer-left">
            <span class="runtime-badge" :class="runtimeBadgeClass()" x-text="runtimeBadgeLabel()"></span>
            <span x-text="yamlText.split('\n').length + ' lines'"></span>
            <span class="footer-error" x-show="runtimeError" x-cloak x-text="runtimeError"></span>
          </div>
        </footer>
      </div>
    </div>

    <!-- Runtime and application scripts. Keep order aligned with site/README.md. -->
    <script type="py" src="./python/bridge.py" config="./pyscript.toml"></script>
    <script src="./js/constants.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/runtime.js"></script>
    <script src="./js/editor.js"></script>
    <script src="./js/contract-codec.js"></script>
    <script src="./js/schema.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/results.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
