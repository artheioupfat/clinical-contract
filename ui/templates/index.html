{% extends "_base.html" %}

{% block content %}

<div x-data="{
  splitX: parseInt(localStorage.getItem('splitX') || 50),
  dragging: false,
  startDrag() {
    this.dragging = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  },
  onDrag(e) {
    if (!this.dragging) return;
    const rect = this.$refs.container.getBoundingClientRect();
    let pct = ((e.clientX - rect.left) / rect.width) * 100;
    this.splitX = Math.min(80, Math.max(20, pct));
    localStorage.setItem('splitX', Math.round(this.splitX));
  },
  stopDrag() {
    this.dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
}" x-ref="container" @mousemove.window="onDrag($event)" @mouseup.window="stopDrag()" class="flex-1 flex overflow-hidden">

  <!-- Editor Panel (left) -->
  <section x-data="appState()" :style="'width:' + splitX + '%'" class="flex flex-col min-h-0 min-w-0 bg-white dark:bg-surface-800">
    {% include "_partials/_editor_panel.html" %}
  </section>

  <!-- Splitter -->
  <div @mousedown.prevent="startDrag()"
       class="flex-shrink-0 cursor-col-resize bg-surface-200 dark:bg-surface-700 transition-all duration-150"
       :class="dragging ? 'w-1 bg-accent-500' : 'w-px hover:w-1 hover:bg-accent-400'">
  </div>

  <!-- Checker Panel (right) -->
  <section x-data="appState()" :style="'width:' + (100 - splitX) + '%'" class="flex flex-col min-h-0 min-w-0 bg-white dark:bg-surface-800">
    {% include "_partials/_checker_panel.html" %}
  </section>

</div>

{% endblock %}
