<!-- Status Bar -->
<footer x-data="{ splitX: parseInt(localStorage.getItem('splitX') || 50) }"
        x-init="window.addEventListener('storage', () => splitX = parseInt(localStorage.getItem('splitX') || 50));
                setInterval(() => splitX = parseInt(localStorage.getItem('splitX') || 50), 200)"
        class="flex border-t border-surface-200 dark:border-surface-700 bg-surface-50 dark:bg-surface-800 text-[11px] text-gray-600 dark:text-gray-400">

  <!-- Left zone (aligned with editor panel) -->
  <div :style="'width:' + splitX + '%'" class="flex items-center gap-3 px-3 py-1">
    <span x-data="appState()">
      <span x-text="lineCount + ' lignes'"></span>
    </span>
  </div>

  <!-- Right zone (aligned with checker panel) -->
  <div :style="'width:' + (100 - splitX) + '%'" class="flex items-center justify-center gap-3 px-3 py-1">
    <div class="flex items-center gap-3" x-data="appState()">
      <template x-if="parquetFileName">
        <div class="flex items-center gap-3">
          <span x-text="parquetFileName"></span>
          <span x-text="parquetInfo.columns + ' col'"></span>
          <span x-text="parquetInfo.rows.toLocaleString('fr-FR') + ' lignes'"></span>
        </div>
      </template>
    </div>
  </div>

  <!-- PyScript indicator (absolute right) -->
  <div class="flex items-center gap-1.5 px-3 py-1 ml-auto shrink-0">
    <span id="pyscript-status">PyScript</span>
    <span class="h-1.5 w-1.5 rounded-full bg-gray-300 dark:bg-gray-600" id="pyscript-indicator"></span>
  </div>

</footer>
