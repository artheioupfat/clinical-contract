<!-- Checker Toolbar -->
<div class="flex items-center border-b border-surface-200 dark:border-surface-700 px-3 py-1">
  <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-600 dark:text-gray-400 mr-auto">Checker</h2>

  <input type="file" accept=".parquet" x-ref="parquetFileInput" @change="handleFileSelect($event)" class="hidden">

  <span class="inline-flex gap-0.5">
    <button @click="$refs.parquetFileInput.click()"
            class="inline-flex items-center gap-1.5 rounded px-2.5 py-1.5 text-xs font-medium text-gray-700 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-surface-100 dark:hover:bg-surface-700 transition-colors">
      <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m6.75 12-3-3m0 0-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
      </svg>
      Charger
    </button>
    <button @click="check()"
            :disabled="!parquetFile"
            class="inline-flex items-center gap-1.5 rounded px-2.5 py-1.5 text-xs font-medium transition-colors"
            :class="parquetFile
              ? 'text-accent-600 dark:text-accent-400 hover:text-accent-700 dark:hover:text-accent-300 hover:bg-accent-500/10'
              : 'text-gray-400 dark:text-gray-600 cursor-not-allowed'">
      <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z" />
      </svg>
      Tester
    </button>
  </span>
</div>
