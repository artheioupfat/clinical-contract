<!-- Checker Panel -->
{% include "_partials/_checker_toolbar.html" %}

<!-- Drop zone (HyperUI file-uploader pattern, always visible) -->
<label
  for="parquetFile"
  class="flex flex-col items-center border-b border-gray-200 bg-white p-4 text-gray-900 dark:border-gray-700 dark:bg-gray-900 dark:text-white cursor-pointer"
  @dragover.prevent="$el.classList.add('bg-gray-50', 'dark:bg-gray-800')"
  @dragleave.prevent="$el.classList.remove('bg-gray-50', 'dark:bg-gray-800')"
  @drop.prevent="$el.classList.remove('bg-gray-50', 'dark:bg-gray-800'); handleDrop($event)"
>
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
    <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 7.5h-.75A2.25 2.25 0 0 0 4.5 9.75v7.5a2.25 2.25 0 0 0 2.25 2.25h7.5a2.25 2.25 0 0 0 2.25-2.25v-7.5a2.25 2.25 0 0 0-2.25-2.25h-.75m0-3-3-3m0 0-3 3m3-3v11.25m6-2.25h.75a2.25 2.25 0 0 1 2.25 2.25v7.5a2.25 2.25 0 0 1-2.25 2.25h-7.5a2.25 2.25 0 0 1-2.25-2.25v-.75" />
  </svg>

  <span class="mt-2 text-sm font-medium dark:text-white" x-text="parquetFileName || 'Glissez un fichier Parquet'"></span>

  <span class="mt-2 inline-block rounded border border-gray-200 bg-gray-50 px-3 py-1.5 text-center text-xs font-medium text-gray-700 shadow-sm hover:bg-gray-100 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-200 dark:hover:bg-gray-700">
    Parcourir
  </span>

  <input type="file" id="parquetFile" accept=".parquet" class="sr-only" @change="handleFileSelect($event)">
</label>

<!-- Results table -->
{% include "_partials/_results_table.html" %}
